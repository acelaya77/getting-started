services:
  app:
    # Use 'build' if you want to use the Dockerfile we just fixed
    build: .
    # image: node:24-alpine # Keep this if you prefer the generic image
    command: sh -c "yarn install && yarn run dev"
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: secret
      MYSQL_DATABASE: todos # Changed from MYSQL_DB to match common patterns
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    volumes:
      - todo-mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: todos
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-psecret",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  todo-mysql-data:
